# Weekly canary: does the PUBLISHED image still extract from YouTube? YouTube changes break
# yt-dlp periodically; this catches it (and emails on failure via GitHub's Actions
# notifications) BEFORE you notice trailers failing — the fix is bumping YTDLP_VERSION.
# Uses Big Buck Bunny (aqz-KE-bpKQ): a decade-old, globally-available H.264 video, so a
# failure means extraction broke, not a geo-block or a removed video. Needs no TMDB_KEY
# (/play takes a YouTube id directly). Runner is in the US, so this tests global yt-dlp
# health, which is the actual maintenance burden.
name: canary

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Start the published image
        run: |
          docker run -d --name trailers -p 8092:8092 \
            ghcr.io/${{ github.repository_owner }}/den-trailer-service:latest
          for i in $(seq 1 20); do
            curl -fsS http://localhost:8092/health && break || sleep 2
          done

      - name: Extract a known-stable video (fails if YouTube broke yt-dlp)
        run: |
          code=$(curl -s -m120 -o out.mp4 -w '%{http_code}' http://localhost:8092/play/aqz-KE-bpKQ.mp4)
          size=$(stat -c%s out.mp4 2>/dev/null || echo 0)
          echo "HTTP $code, ${size} bytes"
          # ffprobe the result is H.264 (what AVPlayer needs)
          test "$code" = "200"
          test "$size" -gt 100000

      - name: Container logs (on failure)
        if: failure()
        run: docker logs trailers
